blueprint:
  name: Device Availability Checker (with Label Exclusions)
  description: |
    Checks all entities/devices for availability and battery level. 
    Excludes devices by area (names starting with _), explicit exclusion list, and now by a specific Label.
  domain: automation
  input:
    check_battery:
      name: Battery warning level
      description: Devices with battery level below this value are considered low.
      default: 20
      selector:
        number:
          min: 5
          max: 100
          unit_of_measurement: "%"
    exclude_label:
      name: Exclude by Label
      description: Entities or devices with this label will be ignored.
      default: []
      selector:
        label:
          multiple: true
    # Existing exclusion input
    exclude:
      name: Exclusions
      description: Entities, devices or areas to ignore.
      default:
        entity_id: []
        device_id: []
        area_id: []
      selector:
        target:
    actions:
      name: Actions
      description: Notifications or actions to run if issues are found.
      selector:
        action: {}

mode: restart

variables:
  # Capture inputs
  check_battery: !input check_battery
  exclude: !input exclude
  exclude_labels: !input exclude_label
  
  # Logic to build the list of excluded entities from the selected labels
  label_excluded_entities: >
    {% set entities = ns(ids=[]) %}
    {% for label in exclude_labels %}
      {% set entities.ids = entities.ids + label_entities(label) %}
    {% endfor %}
    {{ entities.ids }}

  items: >
    {# Initial collection of potential entities #}
    {% set entities = states.sensor 
      | selectattr('attributes.device_class', 'defined')
      | selectattr('attributes.device_class', 'eq', 'battery')
      | map(attribute='entity_id') | list 
      + states.binary_sensor
      | selectattr('attributes.device_class', 'defined')
      | selectattr('attributes.device_class', 'eq', 'battery')
      | map(attribute='entity_id') | list %}
    
    {% set ns = namespace(sensors=[]) %}
    {% for ent in entities %}
      {% set dev_id = device_id(ent) %}
      {% set a_id = area_id(ent) %}
      
      {# Filter Logic #}
      {% set is_excluded = ent in exclude.entity_id 
        or dev_id in exclude.device_id 
        or a_id in exclude.area_id
        or ent in label_excluded_entities
        or (a_id and area_name(a_id).startswith('_')) %}
        
      {% if not is_excluded %}
        {# Battery Logic #}
        {% set s = states(ent) %}
        {% if s in ['unavailable', 'unknown'] %}
          {% set ns.sensors = ns.sensors + [{'device_id': dev_id, 'device_name': device_attr(dev_id, 'name_by_user') or device_attr(dev_id, 'name'), 'area_id': a_id, 'state': s}] %}
        {% elif s | is_number and s | float < check_battery %}
          {% set ns.sensors = ns.sensors + [{'device_id': dev_id, 'device_name': device_attr(dev_id, 'name_by_user') or device_attr(dev_id, 'name'), 'area_id': a_id, 'state': s}] %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.sensors }}

trigger:
  - platform: time
    at: "08:00:00" # Example daily check

condition:
  - condition: template
    value_template: "{{ items | count > 0 }}"

action:
  - choose: []
    default: !input actions
