blueprint:
  name: Device Availability Checker (Label Fix)
  description: |2
    Checks all entities/devices for availability and battery levels.
    Excludes items based on areas, explicit exclusions, or a specific label.
  domain: automation
  input:
    check_battery:
      name: Battery warning level
      default: 20
      selector:
        number:
          min: 5.0
          max: 100.0
          unit_of_measurement: "%"
          mode: slider
          step: 5.0
    check_unavailable:
      name: Check Unavailable?
      default: false
      selector:
        boolean:
    trigger_time:
      name: Time of day to check
      default: "10:00:00"
      selector:
        time:
    trigger_day:
      name: Days of the week
      default: ["1", "2", "3", "4", "5", "6", "7"]
      selector:
        select:
          multiple: true
          options:
            - {label: Monday, value: "1"}
            - {label: Tuesday, value: "2"}
            - {label: Wednesday, value: "3"}
            - {label: Thursday, value: "4"}
            - {label: Friday, value: "5"}
            - {label: Saturday, value: "6"}
            - {label: Sunday, value: "7"}
    exclude:
      name: Exclusions
      default: []
      selector:
        target:
    exclude_label:
      name: Exclusion Label
      description: "Entities or devices with this label will be ignored."
      default: ""
      selector:
        text:
    actions:
      name: Actions
      selector:
        action:

variables:
  trigger_day: !input trigger_day
  check_battery: !input check_battery
  check_unavailable: !input check_unavailable
  exclude: !input exclude
  exclude_label: !input exclude_label
  items: >
    {% set entities = namespace(data=[]) %}
    {% set result = namespace(data=[]) %}
    
    {# 1. Collect all candidate entities #}
    {% set candidates = [] %}
    
    {# Unavailable candidates #}
    {% if check_unavailable %}
      {% set candidates = states | selectattr('state', 'eq', 'unavailable') | map(attribute='entity_id') | list %}
    {% endif %}
    
    {# Battery candidates (binary) #}
    {% set batt_binary = states.binary_sensor 
      | selectattr('attributes.device_class', 'defined') 
      | selectattr('attributes.device_class', 'eq', 'battery') 
      | selectattr('state', 'eq', 'on') 
      | map(attribute='entity_id') | list %}
    
    {# Battery candidates (numeric) #}
    {% set batt_numeric = states.sensor 
      | selectattr('attributes.device_class', 'defined') 
      | selectattr('attributes.device_class', 'eq', 'battery') 
      | rejectattr('state', 'in', ['unavailable', 'unknown'])
      | map(attribute='entity_id') | list %}
    
    {% set all_candidates = (candidates + batt_binary + batt_numeric) | unique | list %}

    {# 2. Filter candidates #}
    {% for eid in all_candidates %}
      {% set dev_id = device_id(eid) %}
      {% set a_id = area_id(eid) %}
      {% set a_name = area_name(eid) or "" %}
      
      {# Determine if we should skip #}
      {% set skip = false %}
      
      {# Area Skip (No area or starts with underscore) #}
      {% if a_id == None or a_name[0:1] == '_' %}
        {% set skip = true %}
      {% endif %}
      
      {# Explicit Exclusions #}
      {% if not skip and exclude is defined %}
        {% if (exclude.entity_id is defined and eid in exclude.entity_id) or
              (exclude.area_id is defined and a_id in exclude.area_id) or
              (dev_id != None and exclude.device_id is defined and dev_id in exclude.device_id) %}
          {% set skip = true %}
        {% endif %}
      {% endif %}
      
      {# Label Exclusion #}
      {% if not skip and exclude_label != "" %}
        {% if exclude_label in labels(eid) or (dev_id != None and exclude_label in device_attr(dev_id, 'labels')) %}
          {% set skip = true %}
        {% endif %}
      {% endif %}

      {# Battery Level Threshold Check #}
      {% if not skip and eid in batt_numeric %}
        {% if (states(eid) | int(-1)) >= (check_battery | int(0)) %}
          {% set skip = true %}
        {% endif %}
      {% endif %}

      {% if not skip %}
        {% set entities.data = entities.data + [eid] %}
      {% endif %}
    {% endfor %}

    {# 3. Format output for notification #}
    {% for eid in entities.data %}
      {% set dev_id = device_id(eid) %}
      {% set friendly = state_attr(eid, 'friendly_name') or eid %}
      {% set result.data = result.data + [{
        'entity_id': eid,
        'device_id': dev_id,
        'friendly_name': friendly,
        'state': states(eid)
      }] %}
    {% endfor %}
    
    {{ result.data }}

trigger:
  - platform: time
    at: !input trigger_time
condition:
  - "{{ ((items | length) > 0) and (now().isoweekday() | string in trigger_day) }}"
action:
  - choose: []
    default: !input actions
mode: single
